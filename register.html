<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FinTrack Pro</title>
    <link rel="stylesheet" href="./css/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Create Account</h1>
            <p class="title">Join FinTrack Pro</p>

            <div class="input-group">
                <label>Choose a Username</label>
                <input type="text" id="login-username" placeholder="Enter your username...">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="text" id="login-password" placeholder="Enter your password...">
            </div>

            <p class="error-mesg hidden" id="reg-error"></p>
            <button id="reg-btn">Login</button>
            <p class="switch-auth">
                Already have an account?
                <a href="login.html">Login here</a>
            </p>

        </div>
        
    </div>
    <script src="./js/auth.js"></script>
</body>

</html>
