<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">

            <div class="top">

                <div class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    <div>
                        <h1>FinTrack Pro</h1>
                        <p>Enterprise Finance</p>
                    </div>
                </div>
                <nav class="left">
                    <ul>
                        <li class="active"><i class="fa-solid fa-border-all"></i> Dashboard</li>
                        <li><i class="fa-solid fa-gear"></i> Settings</li>
                    </ul>
                </nav>

            </div>

            <button class="add-btn">
                + Add Transaction
            </button>
        </aside>

        <main>
            <nav class="navbar">
                <span class="name">Name</span>
                <button id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </nav>


            <div class="dashboard">
                <div class="header"></div>
                <div class="overview-cards">
                    <!--4 cards -->
                </div>
                <div class="main">
                    <div class="analysis"></div>
                    <div class="preferences"></div>
                </div>
                <div class="transactions"></div>

            </div>
        </main>
    </div>
</body>

</html>
