<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">

            <div class="top">

                <div class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    <div>
                        <h1>FinTrack Pro</h1>
                        <p>Enterprise Finance</p>
                    </div>
                </div>
                <nav class="left">
                    <ul>
                        <li class="active"><i class="fa-solid fa-border-all"></i> Dashboard</li>
                        <li><i class="fa-solid fa-gear"></i> Settings</li>
                    </ul>
                </nav>

            </div>

            <button class="add-btn">
                + Add Transaction
            </button>
        </aside>

        <main>
            <nav class="navbar">
                <span class="name">Name</span>
                <button id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </nav>


            <div class="dashboard">
                <div class="header">
                    <div>
                        <h1>Financial Overview</h1>
                        <p>Real-time tracking application</p>
                    </div>
                </div>
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-icon bg-blue">
                            <i class="fa-solid fa-building-columns"></i>
                        </div>
                        <p>Current Balance</p>
                        <h3 id="current-balance">$0.00</h3>
                    </div>
                    <div class="card">
                        <div class="card-icon bg-green">
                            <i class="fa-solid fa-arrow-trend-up"></i>
                        </div>
                        <p>Total Income</p>
                        <h3 id="total-income">$0.00</h3>
                    </div>
                    <div class="card">
                        <div class="card-icon bg-red">
                            <i class="fa-solid fa-arrow-trend-down"></i>
                        </div>
                        <p>Total Expense</p>
                        <h3 id="total-expense">$0.00</h3>
                    </div>
                    <div class="card">
                        <div class="card-icon bg-blue">
                            <i class="fa-solid fa-piggy-bank"></i>
                        </div>
                        <p>Total Transactions</p>
                        <h3 id="total-transactions">0</h3>
                    </div>

                </div>

                <div class="main">
                    <div class="left-col">

                        <div class="analysis">
                            <h2>Cash Flow Analysis</h2>
                            <canvas id="chart"></canvas>
                        </div>

                        <div class="transactions">
                            <h3>All Transactions</h3>
                            <div>
                                <label >
                                    <input type="text" name="" id="">
                                </label>
                            </div>
                        </div>

                    </div>


                    <div class="preferences">
                        <h2>Preferences</h2>
                        <div class="mode-toggle">
                            <p>Dark Mode</p>
                            <label class="switch">
                                <input type="checkbox" id="dark-mode">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <!-- <hr> -->
                        <button class="reset"><i class="fa-solid fa-trash"></i> Reset All Data</button>
                    </div>
                </div>


            </div>
        </main>
    </div>
</body>

</html>
